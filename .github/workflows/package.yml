name: Package Installer

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn clean package

      - name: Verify target contents
        run: dir target

      - name: Create installer
        run: |
          jpackage --type exe --name OSDApp --input target --main-jar rc-osd-1.0-SNAPSHOT.jar 
          --main-class org.rocs.osd.OfficeOfStudentDisciplineApplication --module-path target/lib 
          --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base,java.sql,java.management,java.security.jgss 
          --win-console --win-dir-chooser --win-menu --win-shortcut --dest target

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OSDApp-Installer
          path: target/OSDApp-*.exe