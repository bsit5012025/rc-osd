# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow creates a Windows installer (.exe)

name: Java CI with Maven

permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    workflow_dispatch:

jobs:
  build:
    # Use Windows because jpackage needs it to create .exe installer
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Build project and copy dependencies (target/lib) added skipTests for CI, can still test locally.
    - name: Build with Maven
      run: mvn -B clean package -DskipTests --file pom.xml
    # Verify that build output and dependencies exist
    - name: Verify target contents
      run: dir target
    # Create Windows installer using jpackage
    - name: Create installer
      run: jpackage --type exe --name OSDApp --input target --main-jar rc-osd-1.0-SNAPSHOT.jar --main-class org.rocs.osd.OfficeOfStudentDisciplineApplication --module-path target/lib --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base,java.sql,java.management,java.security.jgss --win-console --win-dir-chooser --win-menu --win-shortcut --dest target
    # Upload generated installer as artifact
    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: OSDApp-Installer
        path: target/OSDApp-*.exe
